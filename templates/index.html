<!DOCTYPE html>

<html>

<head>
    <title>Cat Tinder</title>

    <style>
        body {
            font-family: Arial;
            background: #111;
            color: white;
            text-align: center;
        }

        .hidden {
            display: none;
        }

        button {
            padding: 10px 20px;
            margin: 10px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 6px;
            border: none;
        }

        img {
            width: 300px;
            height: 300px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid white;
        }
    </style>

</head>

<body>

    <!-- START SCREEN -->

    <div id="startScreen">
        <h1>🐱 Cat Tinder</h1>
        <p>Choose your preference:</p>

        ```
        <button onclick="start('gentlemen')">Gentlemen Cats 🎩</button>
        <button onclick="start('ladies')">Lady Cats 🎀</button>
        ```

    </div>

    <!-- MAIN APP -->

    <div id="app" class="hidden">
        <h2 id="categoryTitle"></h2>

        ```
        <img id="catImage">
        <p id="catName"></p>

        <button onclick="nextCat()">❌ Next</button>
        <button onclick="matchCat()">❤️ Match</button>
        <button onclick="goHome()">🏠 Back to Home</button>

        <h3>Matches:</h3>
        <ul id="matchList"></ul>
        ```

    </div>

    <script src="app.js"></script>

</body>

</html>
